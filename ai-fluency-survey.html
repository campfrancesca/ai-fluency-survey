// ─── RECOMMENDATION ENGINE ────────────────────────────────────────────────────
function getRecommendations(answers) {
  const { overallScore, satisfactionScore, llmKnowledge, toolUsage, productivityUsecases, clientUsecases, topPriority, blockers, role } = answers;
  const isBST = role==='BST';
  const isCTM = role==='CTM';
  const isCTL = role==='CTL';
  const isMDP = role==='MDP';
  const level      = (id) => toolUsage[id] || 0;
  const unknown    = (id) => level(id) === 0;
  const heardOnly  = (id) => level(id) === 1;
  const frustrated = (id) => level(id) === 4;
  const notExp     = (id) => !productivityUsecases[id] || productivityUsecases[id]===0;
  const tried      = (id) => productivityUsecases[id]===1;
  const interested = (id) => productivityUsecases[id]===2;
  const notClient   = (id) => !clientUsecases[id] || clientUsecases[id]===0;
  const intClient   = (id) => clientUsecases[id]===2;
  const triedClient = (id) => clientUsecases[id]===1;
  const notOrInt    = (id) => notClient(id)||intClient(id); // not tried OR interested
  const fm=[],oh=[],th=[];

  // ── ALWAYS: AI Cookbook as entry point ───────────────────────────────────────
  if (overallScore <= 4) {
    fm.push("ai_cookbook","what_is_genai","what_is_llm");
    oh.push("genai_skills_bcg");
  }

  // ── SATISFACTION GAP: not happy with results → prompting deep-dives ─────────
  if (satisfactionScore && satisfactionScore <= 4) {
    fm.push("openai_prompting","provide_context","choose_model");
    oh.push("anthropic_prompting","optimizing_outputs");
    th.push("chatgpt_deep_dive");
  }

  // ── ROLE-BASED BOOSTS ────────────────────────────────────────────────────────
  // MDP: short formats only, high-level tools, no automation/coding
  if (isMDP) {
    fm.push("ai_cookbook","voice_mode","whats_available");
    oh.push("teaming_collab","storytelling_pres");
    // deprioritise technical items — they'll be excluded by slice(0,3)
  }
  // CTL: focus on team productivity, shared projects, client deliverables
  if (isCTL) {
    fm.push("shared_projects","digital_assistant","voice_mode");
    oh.push("teaming_collab","outlook_gpt","storytelling_pres");
  }
  // CTM: full range — prompting, tools, use cases, data analysis
  if (isCTM) {
    fm.push("voice_mode","quick_tips_chatgpt");
    oh.push("ai_tool_mashup","analyze_data");
  }
  // BST: focus on day-to-day productivity, outlook, excel, automation
  if (isBST) {
    fm.push("voice_mode","quick_tips_chatgpt");
    oh.push("outlook_gpt","excel_chatgpt","automating_work");
  }

  // ── LLM KNOWLEDGE GAP ─────────────────────────────────────────────────────
  // For frustrated users or LLM beginners → external free resources are best
  if (llmKnowledge <= 3 || frustrated("chatgpt") || frustrated("claude")) {
    fm.push("openai_prompting");
    oh.push("anthropic_prompting");
  }
  if (llmKnowledge <= 5) {
    fm.push("choose_model","provide_context","quick_tips_chatgpt");
    oh.push("ai_tool_mashup"); // intermediate - Canvas, Deep Research, connectors
  }

  // ── TOOL GAPS ─────────────────────────────────────────────────────────────
  // ChatGPT: always useful basics for setup
  if (unknown("chatgpt") || heardOnly("chatgpt")) {
    fm.push("chatgpt_access","whats_available");
    oh.push("chatgpt_guide"); // connectors section especially useful
  }
  if (frustrated("chatgpt")) {
    fm.push("openai_prompting","provide_context");
    oh.push("anthropic_prompting","ai_tool_mashup");
  }

  // Claude: only recommend if they have access (score > 0 implies they've heard of it in BCG context)
  if (unknown("claude") || heardOnly("claude")) {
    fm.push("claude_quickstart");
    oh.push("claude_101");
  } else if (frustrated("claude")) {
    fm.push("openai_prompting");
    oh.push("anthropic_prompting","claude_enterprise");
  }

  // Claude Code: only for advanced/technical profiles
  if ((unknown("claudecode") || heardOnly("claudecode")) && overallScore >= 7) {
    fm.push("claudecode_quickstart");
    oh.push("claudecode_action");
    th.push("claudecode_playbook");
  } else if (frustrated("claudecode")) {
    oh.push("claudecode_action");
    th.push("claudecode_playbook");
  }

  // Navi
  if (unknown("navi") || heardOnly("navi")) {
    fm.push("navi_access");
    oh.push("navi_guide");
  } else if (frustrated("navi")) {
    oh.push("navi_guide");
  }

  // Deckster
  if (unknown("deckster") || heardOnly("deckster")) {
    fm.push("deckster_access");
    oh.push("deckster_guide");
  } else if (frustrated("deckster")) {
    oh.push("storytelling_pres"); // participant guide = 2min version
  }

  // Zoom: must-read for everyone
  fm.push("voice_mode"); // must-read
  if (unknown("zoom") || heardOnly("zoom") || frustrated("zoom")) {
    oh.push("zoom_guide");
  }

  // Copilot / Outlook / SharePoint
  if (unknown("copilot") || heardOnly("copilot")) {
    oh.push("outlook_gpt"); // slides version = 5min
    oh.push("sharepoint_ai");
  } else if (frustrated("copilot")) {
    oh.push("sharepoint_ai");
    th.push("power_automate");
  }

  // n8n: very advanced, only for high scorers
  if ((unknown("n8n") || heardOnly("n8n")) && overallScore >= 7) {
    oh.push("n8n_no_code");
    th.push("n8n_advanced");
  } else if (frustrated("n8n") && overallScore >= 7) {
    oh.push("automating_recording");
    th.push("n8n_advanced","apis_python");
  }

  // ── PRODUCTIVITY USE CASE GAPS ─────────────────────────────────────────────
  // Voice mode: always a must-read (already pushed above)
  
  // Shared Projects & Digital Assistant: good for case team leaders
  if (notExp("artifacts") || notExp("digitaltwin")) {
    fm.push("shared_projects","digital_assistant");
    oh.push("teaming_collab"); // must-read for case team leaders
  }

  // Data analysis: must for PL/Principals (score >= 5), not MDPs
  if ((notExp("agentic")||interested("agentic")) && overallScore >= 5 && overallScore <= 8) {
    fm.push("analyze_data");
    oh.push("excel_chatgpt");
    th.push("data_python");
  } else if ((notExp("agentic")||interested("agentic")) && overallScore >= 9) {
    th.push("data_python","apis_python");
  }

  // Automation: only for advanced users
  if (notExp("scheduled_tasks") && overallScore >= 6) {
    fm.push("automate_save_time","when_to_use_agents");
    oh.push("automating_work");
    th.push("n8n_no_code");
  }

  // Company knowledge / Navi
  if (notExp("company_knowledge")) {
    fm.push("navi_access");
    oh.push("navi_guide");
  }

  // Slides / Deckster
  if (notExp("slides")) {
    fm.push("deckster_access");
    oh.push("storytelling_pres"); // participant guide is 2min
  }

  // Calendar / email management
  if (notExp("calendar")) {
    oh.push("outlook_gpt"); // slides = 5min
  }

  // Team collaboration
  if (notExp("notes") || notExp("newsletter") || notExp("reviews") || notExp("feedback_drafter")) {
    oh.push("teaming_collab");
    fm.push("digital_assistant");
  }

  // ── CLIENT USE CASE GAPS ───────────────────────────────────────────────────
  // ── CLIENT DELIVERABLES ───────────────────────────────────────────────────────
  // Web apps / micro-tools → Claude Code or Lovable
  if (notOrInt("webapps")) {
    if (unknown("claudecode")||heardOnly("claudecode")) { fm.push("claudecode_quickstart"); oh.push("claudecode_action"); th.push("claudecode_playbook"); }
    else { oh.push("claudecode_action"); th.push("claudecode_playbook","apis_python"); }
  } else if (triedClient("webapps")) {
    th.push("claudecode_playbook","apis_python");
  }
  // Podcast / audio → NotebookLM
  if (notOrInt("podcast")) {
    fm.push("whats_available");
  }
  // Dashboard → Excel + Python
  if (notOrInt("dashboard")) {
    oh.push("excel_chatgpt"); th.push("data_python");
  } else if (triedClient("dashboard")) {
    th.push("data_python","apis_python");
  }
  // Agent / chatbot → Custom GPTs first, then n8n
  if (notOrInt("agent")) {
    if (unknown("n8n")||heardOnly("n8n")) { oh.push("custom_gpts_automate"); th.push("n8n_advanced"); }
    else if (frustrated("n8n"))           { th.push("n8n_advanced","apis_python"); }
    else                                  { oh.push("custom_gpts_automate"); th.push("n8n_advanced"); }
  } else if (triedClient("agent")) {
    th.push("n8n_advanced","apis_python");
  }
  // Synthesis → Claude if unknown, else go deeper
  if (notOrInt("synthesis")) {
    if (unknown("claude")||heardOnly("claude")) { fm.push("claude_quickstart"); oh.push("claude_101"); }
    else { oh.push("claude_user_guide"); th.push("claude_enterprise"); }
  }

  // ── DECLARED PRIORITY ──────────────────────────────────────────────────────
  if (topPriority && topPriority.includes("prompting")) {
    fm.push("provide_context","choose_model","quick_tips_chatgpt");
    oh.push("openai_prompting","ai_tool_mashup");
    th.push("anthropic_prompting","chatgpt_deep_dive");
  }
  if (topPriority && topPriority.includes("automating")) {
    fm.push("automate_save_time","when_to_use_agents");
    oh.push("automating_work","automating_recording");
    th.push("n8n_no_code","n8n_advanced");
  }
  if (topPriority && topPriority.includes("Team productivity")) {
    fm.push("shared_projects","voice_mode");
    oh.push("teaming_collab");
    th.push("ai_tool_mashup","custom_gpts");
  }
  if (topPriority && topPriority.includes("agentic")) {
    fm.push("when_to_use_agents");
    oh.push("automating_recording");
    th.push("n8n_advanced","apis_python");
  }
  if (topPriority && topPriority.includes("Client deliverables")) {
    fm.push("digital_assistant");
    oh.push("storytelling_pres","custom_gpts");
    th.push("data_python","n8n_advanced");
  }

  // ── BLOCKERS → targeted training types ───────────────────────────────────────
  const hasBlocker = (b) => blockers && blockers.includes(b);

  // "Not enough time" → short formats only, 5min picks, slide versions
  if (hasBlocker("Limited time to explore new tools")) {
    fm.push("ai_cookbook","voice_mode","data_protection");
    // Override: clear oh/th to keep only fast items — signal via note in results
  }

  // "Don't know where to start" → navigation trainings first
  if (hasBlocker("Unsure where or how to start")) {
    fm.push("ai_cookbook","whats_available","bcg_gpt_store");
    oh.push("genai_skills_bcg","chatgpt_access");
    th.push("chatgpt_deep_dive");
  }

  // "Data security concerns" → responsible AI first
  if (hasBlocker("Client data security & confidentiality concerns")) {
    fm.push("data_protection");
    oh.push("responsible_hi_vig");
    th.push("responsible_ai");
  }

  // "Outputs not reliable" → prompting & evaluation trainings
  if (hasBlocker("Output quality doesn't consistently meet my needs")) {
    fm.push("openai_prompting","choose_model","provide_context");
    oh.push("optimizing_outputs","anthropic_prompting");
    th.push("chatgpt_deep_dive","chatgpt_eval_game");
  }

  // "Unclear which tool for which task" → tool discovery & mashup
  if (hasBlocker("Unclear which tool is best suited for each task")) {
    fm.push("whats_available","ai_cookbook");
    oh.push("ai_tool_mashup","bcg_gpt_store");
    th.push("chatgpt_deep_dive");
  }

  // "No leadership signal" → team & collaboration formats, easy wins to show
  if (hasBlocker("Lack of organisational guidance or mandate")) {
    fm.push("voice_mode","shared_projects");
    oh.push("teaming_collab");
    th.push("ai_tool_mashup");
  }

  // ── DEDUPLICATE, ENFORCE DURATION LIMITS & LIMIT TO 3 ──────────────────────
  const resolve = (ids, maxMins) => {
    const seen = new Set();
    return ids
      .filter(id=>{ if(seen.has(id)) return false; seen.add(id); return true; })
      .map(id=>CATALOGUE.find(c=>c.id===id))
      .filter(Boolean)
      .filter(item => !maxMins || (item.durationMin||60) <= maxMins)
      .slice(0,3);
  };
  return {
    fiveMin:    resolve(fm, 15),   // max 15 min in 5-min bucket
    oneHour:    resolve(oh, 70),   // max ~1h10 in 1-hour bucket
    threeHours: resolve(th, null), // no limit for 3-hour bucket
  };
}

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",gap:"14px",marginBottom:"10px"}}>
        <input type="range" min={1} max={10} value={value} onChange={e=>onChange(+e.target.value)}

                    if(sel) set("topPriority",ans.topPriority.filter(x=>x!==label));
                    else if(!maxReached) set("topPriority",[...ans.topPriority,label]);
                  }} style={{padding:"10px 13px",borderRadius:"8px",cursor:maxReached?"default":"pointer",marginBottom:"5px",fontSize:"13px",transition:"all 0.14s",background:sel?`${color}10`:maxReached?"rgba(255,255,255,0.01)":"rgba(255,255,255,0.02)",border:`1px solid ${sel?color+"38":"rgba(255,255,255,0.05)"}`,color:sel?"#f1f5f9":maxReached?"#374151":"#94a3b8",display:"flex",alignItems:"center",gap:"10px",opacity:maxReached?0.45:1}}>
                    <div style={{width:"14px",height:"14px",borderRadius:"3px",flexShrink:0,border:`2px solid ${sel?color:"#374151"}`,background:sel?color:"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>
                      {sel&&<span style={{color:"#0f1117",fontSize:"9px",fontWeight:"800"}}>✓</span>}
                    </div>
                    <span style={{flex:1}}>{label}</span>
                    <span style={{fontSize:"9px",padding:"2px 6px",borderRadius:"99px",background:sel?`${color}20`:"rgba(255,255,255,0.04)",color:sel?color:"#374151",fontWeight:"700",flexShrink:0}}>{tag}</span>
                  </div>
                );
              })}
              <div style={{marginTop:"10px"}}>
                <label style={{...S.lbl,display:"block",marginBottom:"5px",fontSize:"12px"}}>Other learning goal <span style={{color:"#475569"}}>(optional)</span></label>
                <input value={ans.topPriorityOther||""} onChange={e=>set("topPriorityOther",e.target.value)} placeholder="Describe any other area you'd like to develop…" style={{...S.inp,fontSize:"12px"}}/>
              </div>
            </div>
          </div>
        )}

        {!done&&step===7&&(
          <div>
            <StepHeader step={7}/>
            <h2 style={{fontSize:"22px",fontWeight:"700",color:"#f1f5f9",margin:"0 0 4px",fontFamily:"'Syne',sans-serif"}}>Last two things</h2>
            <div style={{display:"flex",flexDirection:"column",gap:"18px"}}>
              <div style={S.box}>
                <label style={{...S.lbl,display:"block",marginBottom:"10px",fontWeight:"600",color:"#cbd5e1"}}>What factors influence how frequently you use AI tools? <span style={{color:"#475569",fontWeight:"400"}}>(select all that apply)</span></label>
                {[
                  {label:"Not enough time to explore",                        hint:"→ We'll prioritise 5-min formats only",           hintColor:"#4ade80"},
                  {label:"Don't know where to start",                         hint:"→ We'll suggest a clear navigation path first",   hintColor:"#22d3ee"},
                  {label:"Client data security & confidentiality concerns",   hint:"→ We'll start with Responsible AI resources",     hintColor:"#fb923c"},
                  {label:"Outputs aren't reliable or consistent enough yet",  hint:"→ We'll focus on prompting & output quality",     hintColor:"#f472b6"},
                  {label:"Unclear which tool to use for which task",          hint:"→ We'll help you map the right tool per task",    hintColor:"#818cf8"},
                  {label:"No strong signal or mandate from leadership",        hint:"→ We'll suggest easy wins you can start today",   hintColor:"#fbbf24"},
                ].map(({label,hint,hintColor})=>{
                  const checked=ans.blockers.includes(label);
                  return (
                    <div key={label} onClick={()=>toggle("blockers",label)} style={{padding:"9px 12px",borderRadius:"8px",cursor:"pointer",marginBottom:"5px",fontSize:"13px",transition:"all 0.14s",background:checked?"rgba(251,146,60,0.08)":"rgba(255,255,255,0.02)",border:`1px solid ${checked?"rgba(251,146,60,0.3)":"rgba(255,255,255,0.05)"}`,transition:"all 0.14s"}}>
                      <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
                        <div style={{width:"14px",height:"14px",borderRadius:"3px",flexShrink:0,border:`2px solid ${checked?"#fb923c":"#374151"}`,background:checked?"#fb923c":"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>
                          {checked&&<span style={{color:"#0f1117",fontSize:"9px",fontWeight:"800"}}>✓</span>}
                        </div>
                        <span style={{color:checked?"#fed7aa":"#94a3b8"}}>{label}</span>
                      </div>
                      {checked&&(
                        <div style={{marginTop:"5px",paddingLeft:"24px",fontSize:"11px",color:hintColor,fontStyle:"italic"}}>
                          {hint}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
              <div style={S.box}>
                <label style={{...S.lbl,display:"block",marginBottom:"6px",fontWeight:"600",color:"#cbd5e1"}}>Would you join a 2h live virtual session covering the key tools & use cases, with hands-on practice?</label>
                <p style={{fontSize:"12px",color:"#475569",margin:"0 0 10px"}}>Small group, interactive, designed for senior consultants.</p>
                <div style={{display:"flex",gap:"8px"}}>
                  {["Yes","Maybe","No"].map(opt=>{
                    const sel=ans.liveSession===opt;
                    const color=opt==="Yes"?"#4ade80":opt==="Maybe"?"#22d3ee":"#64748b";
                    return (
                      <button key={opt} onClick={()=>set("liveSession",opt)}
                        style={{flex:1,padding:"10px",borderRadius:"8px",border:`1px solid ${sel?color+"55":"rgba(255,255,255,0.07)"}`,background:sel?`${color}12`:"rgba(255,255,255,0.02)",color:sel?color:"#64748b",fontFamily:"'Syne',sans-serif",fontWeight:"700",fontSize:"13px",cursor:"pointer",transition:"all 0.14s"}}>
                        {opt}
                      </button>
                    );
                  })}
                </div>
              </div>
              <div>
                <label style={{...S.lbl,display:"block",marginBottom:"5px"}}>Anything else — topics, specific requests, use cases to explore?</label>
                <textarea value={ans.freeText} onChange={e=>set("freeText",e.target.value)} placeholder="Free text…" rows={3} style={{...S.inp,resize:"vertical",fontFamily:"inherit"}}/>
              </div>
            </div>
          </div>
        )}

        {/* NAV */}
        {!done&&step>0&&(
          <div style={{display:"flex",justifyContent:"space-between",marginTop:"26px",gap:"10px"}}>
            <button onClick={()=>setStep(s=>s-1)} style={S.btnSec}>← Back</button>
            {step<TOTAL_STEPS
              ?<button onClick={()=>setStep(s=>s+1)} disabled={!canGo} style={{...S.btn,opacity:canGo?1:0.4,cursor:canGo?"pointer":"default"}}>Continue →</button>
              :<button onClick={()=>{
              // Submit to Google Sheets via Apps Script Web App
              const payload = {
                email:        ans.email||"",
                role:         ans.role||"",
                fluency:      ans.overallScore,
                satisfaction: ans.satisfactionScore||"",
                llm:          ans.llmKnowledge,
                tools_weekly: TOOLS.filter(t=>(ans.toolUsage[t.id]||0)===3).map(t=>t.label).join(", "),
                tools_frustrated: TOOLS.filter(t=>(ans.toolUsage[t.id]||0)===4).map(t=>t.label).join(", "),
                prod_tried:   Object.entries(ans.productivityUsecases).filter(([,v])=>v===1).map(([k])=>k).join(", "),
                prod_interested: Object.entries(ans.productivityUsecases).filter(([,v])=>v===2).map(([k])=>k).join(", "),
                client_tried: Object.entries(ans.clientUsecases).filter(([,v])=>v===1).map(([k])=>k).join(", "),
                client_interested: Object.entries(ans.clientUsecases).filter(([,v])=>v===2).map(([k])=>k).join(", "),
                priority:     (ans.topPriority||[]).join(" | "),
                priority_other: ans.topPriorityOther||"",
                blockers:     (ans.blockers||[]).join(" | "),
                live_session: ans.liveSession||"",
                comments:     ans.freeText||"",
                recs_5min:    getRecommendations(ans).fiveMin.map(i=>i.title).join(" | "),
                recs_1h:      getRecommendations(ans).oneHour.map(i=>i.title).join(" | "),
                recs_deep:    getRecommendations(ans).threeHours.map(i=>i.title).join(" | "),
                timestamp:    new Date().toISOString(),
              };
              fetch("https://script.google.com/macros/s/AKfycbxYqz3GpZKdgh2VRd3UGF-l3S58xhznterBrkhPA6Yhq-0PYAJyD7QmVX3YGNeW9IP4ZQ/exec", {
                method:"POST",
                mode:"no-cors",
                headers:{"Content-Type":"application/json"},
                body:JSON.stringify(payload)
              }).catch(()=>{}); // silent fail — never block user
              setDone(true);
            }} style={{...S.btn,background:"linear-gradient(135deg,#4ade80,#22d3ee)"}}>See my training plan ✦</button>
            }
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
